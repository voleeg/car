<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car — Server</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0d0e10;
  --sidebar:  #111215;
  --panel:    #16181c;
  --surface:  #1e2026;
  --surface2: #26292f;
  --border:   #2e3138;
  --accent:   #e8420a;
  --accent2:  #ff6b35;
  --gold:     #f0a500;
  --green:    #3ddc84;
  --red:      #ff4444;
  --text:     #e8e6e0;
  --muted:    #6b6f7a;
  --font-head: 'Rajdhani', sans-serif;
  --font-body: 'Barlow', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── JOIN SCREEN ── */
#join-screen {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 200;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(232,66,10,0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 30%, rgba(240,165,0,0.07) 0%, transparent 50%);
}

.join-card {
  width: 420px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 52px 44px;
  box-shadow: 0 50px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(232,66,10,0.08);
  text-align: center;
}

.server-icon-big {
  width: 80px; height: 80px;
  background: linear-gradient(145deg, var(--accent), var(--gold));
  border-radius: 28px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px;
  font-size: 36px;
  box-shadow: 0 12px 40px rgba(232,66,10,0.35);
}

.join-title {
  font-family: var(--font-head);
  font-size: 36px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text);
  margin-bottom: 4px;
}

.join-subtitle {
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 36px;
  font-weight: 300;
}

.join-label {
  display: block;
  text-align: left;
  font-size: 11px;
  font-family: var(--font-head);
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--muted);
  margin-bottom: 8px;
}

.join-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 16px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  margin-bottom: 20px;
}
.join-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(232,66,10,0.15);
}
.join-input::placeholder { color: var(--muted); }

.join-btn {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; border-radius: 12px;
  color: #fff;
  font-family: var(--font-head);
  font-size: 17px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 8px 24px rgba(232,66,10,0.3);
}
.join-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(232,66,10,0.4); }
.join-btn:active { transform: translateY(0); }

/* ── APP ── */
#app { display: none; height: 100vh; flex-direction: row; }

/* ── SERVER SIDEBAR (far left) ── */
.server-bar {
  width: 68px;
  background: var(--bg);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  align-items: center;
  padding: 12px 0;
  gap: 8px;
  flex-shrink: 0;
}

.server-icon {
  width: 48px; height: 48px;
  background: linear-gradient(145deg, var(--accent), var(--gold));
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  cursor: pointer;
  transition: border-radius 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(232,66,10,0.3);
  flex-shrink: 0;
}
.server-icon:hover { border-radius: 12px; box-shadow: 0 6px 20px rgba(232,66,10,0.5); }
.server-icon.active { border-radius: 12px; outline: 2px solid var(--accent); outline-offset: 2px; }

/* ── CHANNEL SIDEBAR ── */
.channel-bar {
  width: 230px;
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  flex-shrink: 0;
}

.server-header {
  padding: 16px 16px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  cursor: pointer;
  transition: background 0.15s;
}
.server-header:hover { background: var(--surface); }

.server-name {
  font-family: var(--font-head);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text);
}
.server-chevron { color: var(--muted); font-size: 12px; margin-left: auto; }

.channel-section {
  padding: 16px 8px 4px;
}

.section-label {
  font-family: var(--font-head);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 0 8px;
  margin-bottom: 4px;
  display: flex; align-items: center; gap: 6px;
}
.section-label::before {
  content: '▾';
  font-size: 10px;
}

.channel-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px;
  border-radius: 8px;
  cursor: pointer;
  color: var(--muted);
  font-size: 14px;
  font-weight: 500;
  transition: all 0.15s;
  margin-bottom: 1px;
  position: relative;
}
.channel-item:hover { background: var(--surface); color: var(--text); }
.channel-item.active { background: var(--surface2); color: var(--text); }
.channel-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  width: 3px; height: 60%;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
}

.ch-icon { font-size: 16px; flex-shrink: 0; }

.voice-users-list {
  padding-left: 28px;
  margin-top: 2px;
}

.voice-user-item {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 6px;
  border-radius: 6px;
  font-size: 12px;
  color: var(--muted);
  transition: background 0.1s;
}
.voice-user-item:hover { background: var(--surface); }

.vu-dot {
  width: 20px; height: 20px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700;
  font-family: var(--font-head);
  flex-shrink: 0;
}

.mic-icon { font-size: 11px; margin-left: auto; }

/* User panel bottom */
.user-panel {
  margin-top: auto;
  padding: 10px 8px;
  border-top: 1px solid var(--border);
  background: var(--bg);
  display: flex; align-items: center; gap: 8px;
}

.my-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--gold));
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  font-family: var(--font-head);
  flex-shrink: 0;
}

.my-name { font-size: 13px; font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.my-status { font-size: 10px; color: var(--green); }

.panel-btns { display: flex; gap: 4px; }

.panel-btn {
  width: 28px; height: 28px;
  background: transparent; border: none;
  color: var(--muted); cursor: pointer;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: all 0.15s;
}
.panel-btn:hover { background: var(--surface2); color: var(--text); }
.panel-btn.muted { color: var(--red); }

/* ── MAIN CONTENT ── */
.main-content {
  flex: 1;
  display: flex; flex-direction: column;
  overflow: hidden;
  background: var(--panel);
}

/* Channel header */
.content-header {
  height: 52px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 20px;
  gap: 10px;
  flex-shrink: 0;
  background: var(--panel);
}

.content-header-icon { font-size: 18px; }
.content-header-name {
  font-family: var(--font-head);
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 1px;
}
.content-header-desc { color: var(--muted); font-size: 12px; margin-left: 8px; }

/* ── VOICE CHANNEL VIEW ── */
#voice-view {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden;
}

.voice-stage {
  flex: 1;
  display: flex;
  flex-wrap: wrap;
  align-content: flex-start;
  gap: 12px;
  padding: 20px;
  overflow-y: auto;
}

.voice-tile {
  width: 200px; height: 160px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px;
  position: relative;
  transition: border-color 0.3s;
  overflow: hidden;
}
.voice-tile.speaking { border-color: var(--green); box-shadow: 0 0 0 2px rgba(61,220,132,0.25); }
.voice-tile video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

.tile-av {
  width: 56px; height: 56px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 700;
  font-family: var(--font-head);
  position: relative; z-index: 1;
  transition: box-shadow 0.1s;
}
.tile-av.speaking-ring {
  box-shadow: 0 0 0 3px var(--green), 0 0 12px rgba(61,220,132,0.5);
}
@keyframes speaking-pulse {
  0%   { box-shadow: 0 0 0 3px var(--green), 0 0 8px rgba(61,220,132,0.4); }
  50%  { box-shadow: 0 0 0 4px var(--green), 0 0 18px rgba(61,220,132,0.7); }
  100% { box-shadow: 0 0 0 3px var(--green), 0 0 8px rgba(61,220,132,0.4); }
}
.tile-av.speaking-ring {
  animation: speaking-pulse 0.6s ease-in-out infinite;
}

.tile-name {
  font-size: 13px; font-weight: 500;
  position: relative; z-index: 1;
}

.tile-badge {
  position: absolute; bottom: 8px; left: 8px;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  border-radius: 5px; padding: 2px 8px;
  font-size: 11px; font-family: var(--font-head);
  z-index: 2;
}

.tile-mic-badge {
  position: absolute; top: 8px; right: 8px;
  background: rgba(0,0,0,0.5);
  border-radius: 50%; width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; z-index: 2;
}

.voice-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; color: var(--muted);
}
.voice-empty .big-icon { font-size: 48px; opacity: 0.3; }
.voice-empty p { font-size: 14px; }

/* Voice controls */
.voice-controls {
  height: 68px;
  background: var(--sidebar);
  border-top: 1px solid var(--border);
  display: flex; align-items: center;
  justify-content: center; gap: 14px;
  flex-shrink: 0;
}

.vc-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  transition: all 0.18s;
}
.vc-btn:hover { background: var(--surface); border-color: var(--accent2); transform: scale(1.06); }
.vc-btn.on  { background: var(--accent); border-color: var(--accent); }
.vc-btn.off { background: var(--surface2); border-color: var(--red); color: var(--red); }
.vc-btn.leave { background: var(--red); border-color: var(--red); font-size: 15px; }

.not-in-voice {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
}

.join-voice-btn {
  padding: 12px 28px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; border-radius: 12px;
  color: #fff; font-family: var(--font-head);
  font-size: 16px; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 6px 20px rgba(232,66,10,0.3);
}
.join-voice-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(232,66,10,0.45); }

/* ── TEXT CHANNEL VIEW ── */
#text-view {
  flex: 1; display: none; flex-direction: column; overflow: hidden;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px;
  display: flex; flex-direction: column; gap: 2px;
  scroll-behavior: smooth;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.msg {
  display: flex; gap: 12px;
  padding: 6px 10px;
  border-radius: 8px;
  transition: background 0.1s;
}
.msg:hover { background: var(--surface); }

.msg-av {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700;
  font-family: var(--font-head);
  flex-shrink: 0; margin-top: 2px;
}

.msg-body { flex: 1; min-width: 0; }
.msg-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px; }
.msg-name { font-size: 14px; font-weight: 600; font-family: var(--font-head); letter-spacing: 0.5px; }
.msg-time { font-size: 10px; color: var(--muted); }
.msg-text { font-size: 13px; color: var(--text); line-height: 1.55; word-break: break-word; }

.sys-msg {
  text-align: center; font-size: 11px;
  color: var(--muted); padding: 8px;
  font-family: var(--font-head); letter-spacing: 1px;
  display: flex; align-items: center; gap: 10px;
}
.sys-msg::before,.sys-msg::after { content:''; flex:1; height:1px; background:var(--border); }

.text-input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

.text-input-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  display: flex; align-items: center;
  padding: 4px 6px 4px 16px;
  gap: 8px;
  transition: border-color 0.2s;
}
.text-input-wrap:focus-within { border-color: var(--accent); }

.text-input {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-family: var(--font-body); font-size: 14px;
  padding: 8px 0;
}
.text-input::placeholder { color: var(--muted); }

.send-btn {
  width: 36px; height: 36px;
  background: var(--accent); border: none; border-radius: 8px;
  color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  transition: all 0.18s;
  flex-shrink: 0;
}
.send-btn:hover { background: var(--accent2); transform: scale(1.05); }

/* ── MEMBERS SIDEBAR ── */
.members-bar {
  width: 200px;
  background: var(--sidebar);
  border-left: 1px solid var(--border);
  flex-shrink: 0;
  overflow-y: auto;
  padding: 12px 8px;
}
.members-bar::-webkit-scrollbar { width: 3px; }
.members-bar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.members-section-label {
  font-family: var(--font-head);
  font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted);
  padding: 0 8px; margin-bottom: 6px;
}

.member-item {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 8px; border-radius: 8px;
  cursor: pointer; color: var(--muted);
  font-size: 13px; font-weight: 500;
  transition: all 0.15s;
  margin-bottom: 1px;
}
.member-item:hover { background: var(--surface); color: var(--text); }

.member-av {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  font-family: var(--font-head);
  flex-shrink: 0; position: relative;
}

.online-ring {
  position: absolute; bottom: -1px; right: -1px;
  width: 9px; height: 9px;
  background: var(--green);
  border-radius: 50%;
  border: 2px solid var(--sidebar);
}

/* ── VOLUME SLIDER ── */
.tile-volume {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 8px 10px 10px;
  background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
  display: flex; align-items: center; gap: 7px;
  z-index: 3;
  opacity: 0;
  transition: opacity 0.2s;
}
.voice-tile:hover .tile-volume { opacity: 1; }

.vol-icon { font-size: 13px; flex-shrink: 0; }

.vol-slider {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 4px;
  border-radius: 4px;
  background: rgba(255,255,255,0.2);
  outline: none;
  cursor: pointer;
  position: relative;
}
.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent2);
  cursor: pointer;
  box-shadow: 0 0 6px rgba(232,66,10,0.6);
  transition: transform 0.15s;
}
.vol-slider::-webkit-slider-thumb:hover { transform: scale(1.3); }
.vol-slider::-moz-range-thumb {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--accent2);
  cursor: pointer;
  border: none;
}

.vol-pct {
  font-size: 10px;
  font-family: var(--font-head);
  color: rgba(255,255,255,0.7);
  min-width: 30px;
  text-align: right;
  flex-shrink: 0;
}

/* TOAST */
.toast {
  position: fixed; top: 16px; left: 50%;
  transform: translateX(-50%) translateY(-70px);
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 20px;
  font-size: 13px; font-family: var(--font-head);
  letter-spacing: 1px; z-index: 999;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.ok { border-color: var(--green); color: var(--green); }
.toast.warn { border-color: var(--accent); color: var(--accent2); }

/* User colors */
.c0 { background: linear-gradient(135deg,#e8420a,#ff6b35); }
.c1 { background: linear-gradient(135deg,#3ddc84,#0f9e57); }
.c2 { background: linear-gradient(135deg,#4a9eff,#1a6fd4); }
.c3 { background: linear-gradient(135deg,#f0a500,#c47d00); }
.c4 { background: linear-gradient(135deg,#c84bff,#8b00e8); }
.c5 { background: linear-gradient(135deg,#ff4488,#c40048); }
.c6 { background: linear-gradient(135deg,#00d4cc,#007a76); }
.c7 { background: linear-gradient(135deg,#ffaa00,#cc7700); }
</style>
</head>
<body>

<!-- JOIN SCREEN -->
<div id="join-screen">
  <div class="join-card">
    <div class="server-icon-big">🚗</div>
    <div class="join-title">Car</div>
    <div class="join-subtitle">A community for car enthusiasts</div>
    <label class="join-label">Your Name</label>
    <input type="text" class="join-input" id="name-input" placeholder="Enter your name..." maxlength="24" autofocus>
    <button class="join-btn" onclick="joinServer()">JOIN SERVER →</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- APP -->
<div id="app">

  <!-- SERVER BAR -->
  <div class="server-bar">
    <div class="server-icon active" title="Car">🚗</div>
  </div>

  <!-- CHANNEL SIDEBAR -->
  <div class="channel-bar">
    <div class="server-header">
      <div class="server-name">🚗 Car</div>
      <span class="server-chevron">▾</span>
    </div>

    <!-- Text channels -->
    <div class="channel-section">
      <div class="section-label">Text Channels</div>
      <div class="channel-item active" id="ch-general" onclick="switchTo('text','general')">
        <span class="ch-icon">#</span>
        <span>general</span>
      </div>
    </div>

    <!-- Voice channels -->
    <div class="channel-section">
      <div class="section-label">Voice Channels</div>

      <div class="channel-item" id="ch-garage" onclick="switchTo('voice','garage')">
        <span class="ch-icon">🔊</span>
        <span>Garage</span>
      </div>
      <div class="voice-users-list" id="vu-garage"></div>

      <div class="channel-item" id="ch-raceway" onclick="switchTo('voice','raceway')">
        <span class="ch-icon">🔊</span>
        <span>Raceway</span>
      </div>
      <div class="voice-users-list" id="vu-raceway"></div>

      <div class="channel-item" id="ch-showroom" onclick="switchTo('voice','showroom')">
        <span class="ch-icon">🔊</span>
        <span>Showroom</span>
      </div>
      <div class="voice-users-list" id="vu-showroom"></div>
    </div>

    <!-- User panel -->
    <div class="user-panel">
      <div class="my-avatar" id="my-avatar-panel"></div>
      <div>
        <div class="my-name" id="my-name-panel"></div>
        <div class="my-status">● Online</div>
      </div>
      <div class="panel-btns">
        <button class="panel-btn" id="panel-mic" onclick="togglePanelMic()" title="Mute">🎙️</button>
        <button class="panel-btn" onclick="refreshPage()" title="Refresh">🔄</button>
        <button class="panel-btn" onclick="leaveServer()" title="Leave">🚪</button>
      </div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">

    <!-- Header -->
    <div class="content-header">
      <span class="content-header-icon" id="ch-header-icon">#</span>
      <span class="content-header-name" id="ch-header-name">general</span>
      <span class="content-header-desc" id="ch-header-desc">General car talk</span>
    </div>

    <!-- VOICE VIEW -->
    <div id="voice-view">
      <!-- Not in voice -->
      <div class="not-in-voice" id="not-in-voice">
        <div style="font-size:48px">🎙️</div>
        <div style="color:var(--muted);font-size:14px;">You're not in this voice channel</div>
        <button class="join-voice-btn" onclick="joinVoice()">Join Voice</button>
      </div>

      <!-- In voice -->
      <div id="in-voice" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
        <div class="voice-stage" id="voice-stage"></div>
        <div class="voice-controls">
          <button class="vc-btn" id="vc-mic" onclick="toggleVcMic()" title="Mute">🎙️</button>
          <button class="vc-btn" id="vc-cam" onclick="toggleVcCam()" title="Camera">📷</button>
          <button class="vc-btn" id="vc-screen" onclick="toggleVcScreen()" title="Screen Share">🖥️</button>
          <button class="vc-btn leave" onclick="leaveVoice()" title="Leave Voice">📞</button>
        </div>
      </div>
    </div>

    <!-- TEXT VIEW -->
    <div id="text-view">
      <div class="messages" id="messages">
        <div class="sys-msg">Welcome to #general — the Car server!</div>
      </div>
      <div class="text-input-area">
        <div class="text-input-wrap">
          <input type="text" class="text-input" id="text-input" placeholder="Message #general..." onkeydown="if(event.key==='Enter') sendTextMsg()">
          <button class="send-btn" onclick="sendTextMsg()">➤</button>
        </div>
      </div>
    </div>

  </div>

  <!-- MEMBERS SIDEBAR -->
  <div class="members-bar">
    <div class="members-section-label" style="margin-bottom:10px;">Online — <span id="member-count">0</span></div>
    <div id="members-list"></div>
  </div>

</div>

<script>
// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
let myName = '';
let myColor = 0;
let currentChannel = 'general';
let currentChannelType = 'text';
let inVoiceChannel = null; // 'garage' | 'raceway' | 'showroom' | null

let localStream = null;
let screenStream = null;
let vcMicOn = true;
let vcCamOn = false;
let vcScreenOn = false;

// members[name] = { name, color, channel: null | 'garage'|'raceway'|'showroom', micOn, camOn }
let members = {};

// peers[name] = { pc, dc, stream }
let peers = {};

// peerVolumes[name] = 0–200 (100 = normal)
let peerVolumes = {};

// audioCtx & gainNodes[name]
let audioCtx = null;
let gainNodes = {};

// speaking detection
let analyserNodes = {};       // name -> AnalyserNode
let speakingState = {};       // name -> bool
let speakingTimers = {};      // name -> timeout id
const SPEAK_THRESHOLD = 10;   // volume level 0-255 to trigger speaking
const SPEAK_HOLDOFF_MS = 400; // how long to keep ring after silence

function startSpeakDetect(name, stream) {
  if (!stream || stream.getAudioTracks().length === 0) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(stream);
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.3;
    src.connect(analyser);
    analyserNodes[name] = analyser;
    const data = new Uint8Array(analyser.frequencyBinCount);

    function tick() {
      if (!analyserNodes[name]) return;
      analyser.getByteFrequencyData(data);
      const avg = data.reduce((s, v) => s + v, 0) / data.length;
      const isSpeaking = avg > SPEAK_THRESHOLD;

      if (isSpeaking) {
        clearTimeout(speakingTimers[name]);
        speakingTimers[name] = null;
        if (!speakingState[name]) {
          speakingState[name] = true;
          setSpeakingUI(name, true);
        }
      } else if (speakingState[name] && !speakingTimers[name]) {
        speakingTimers[name] = setTimeout(() => {
          speakingState[name] = false;
          speakingTimers[name] = null;
          setSpeakingUI(name, false);
        }, SPEAK_HOLDOFF_MS);
      }
      requestAnimationFrame(tick);
    }
    tick();
  } catch(e) {}
}

function setSpeakingUI(name, active) {
  // Avatar ring on tile
  const av = document.getElementById('spkav-' + name);
  if (av) {
    if (active) av.classList.add('speaking-ring');
    else av.classList.remove('speaking-ring');
  }
  // Tile border glow
  const tile = document.getElementById('tile-' + name);
  if (tile) {
    if (active) tile.classList.add('speaking');
    else tile.classList.remove('speaking');
  }
}

function stopSpeakDetect(name) {
  if (analyserNodes[name]) { analyserNodes[name].disconnect(); delete analyserNodes[name]; }
  clearTimeout(speakingTimers[name]);
  delete speakingTimers[name];
  delete speakingState[name];
}

const COLORS = ['c0','c1','c2','c3','c4','c5','c6','c7'];
const CHANNEL_INFO = {
  general:  { icon: '#', desc: 'General car talk' },
  garage:   { icon: '🔊', desc: 'Chill voice chat' },
  raceway:  { icon: '🔊', desc: 'Race talk & hype' },
  showroom: { icon: '🔊', desc: 'Show off your ride' },
};

const RTC_CFG = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
let channel; // BroadcastChannel

// ════════════════════════════════════════
// JOIN
// ════════════════════════════════════════
function joinServer() {
  const n = document.getElementById('name-input').value.trim();
  if (!n) { document.getElementById('name-input').style.borderColor='var(--red)'; return; }
  myName = n;
  myColor = Math.floor(Math.random() * COLORS.length);

  document.getElementById('join-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('my-avatar-panel').textContent = myName[0].toUpperCase();
  document.getElementById('my-avatar-panel').className = 'my-avatar ' + COLORS[myColor];
  document.getElementById('my-name-panel').textContent = myName;

  // Setup signaling
  channel = new BroadcastChannel('car-server-v1');
  channel.onmessage = onSignal;

  // Add myself
  members[myName] = { name: myName, color: myColor, channel: null, micOn: true, camOn: false };
  broadcast({ type: 'hello', name: myName, color: myColor });
  renderMembers();
  switchTo('text', 'general');
  addSys(myName + ' joined the server');
  toast(myName + ' — welcome to Car! 🚗', 'ok');
}

// ════════════════════════════════════════
// SIGNALING
// ════════════════════════════════════════
function broadcast(data) { channel?.postMessage({ ...data, _from: myName }); }

async function onSignal(e) {
  const msg = e.data;
  if (msg._from === myName) return;

  if (msg.type === 'hello') {
    members[msg.name] = { name: msg.name, color: msg.color, channel: null, micOn: true, camOn: false };
    renderMembers(); renderVoiceUsers();
    addSys(msg.name + ' joined the server');
    // Reply with my info
    broadcast({ type: 'welcome', name: myName, color: myColor, voiceCh: inVoiceChannel });
    // If they're in the same voice channel, offer them
    if (inVoiceChannel && msg.voiceCh === inVoiceChannel) {
      await offerPeer(msg.name);
    }
  }

  if (msg.type === 'welcome') {
    if (!members[msg.name]) {
      members[msg.name] = { name: msg.name, color: msg.color, channel: msg.voiceCh, micOn: true, camOn: false };
    } else {
      members[msg.name].channel = msg.voiceCh;
      members[msg.name].color = msg.color;
    }
    renderMembers(); renderVoiceUsers(); renderVoiceStage();
  }

  if (msg.type === 'joined-voice') {
    if (members[msg.name]) members[msg.name].channel = msg.channel;
    else members[msg.name] = { name: msg.name, color: 0, channel: msg.channel, micOn: true, camOn: false };
    renderVoiceUsers(); renderVoiceStage();
    addSysSilent(msg.name + ' joined ' + msg.channel);
    // If I'm in the same channel and they just arrived, offer
    if (inVoiceChannel === msg.channel) {
      await offerPeer(msg.name);
    }
  }

  if (msg.type === 'left-voice') {
    if (members[msg.name]) members[msg.name].channel = null;
    removePeer(msg.name);
    renderVoiceUsers(); renderVoiceStage();
  }

  if (msg.type === 'left-server') {
    delete members[msg.name];
    removePeer(msg.name);
    addSys(msg.name + ' left the server');
    renderMembers(); renderVoiceUsers(); renderVoiceStage();
  }

  if (msg.type === 'chat') {
    showTextMsg(msg.name, msg.color, msg.text);
  }

  if (msg.type === 'voice-state') {
    if (members[msg.name]) { members[msg.name].micOn = msg.micOn; members[msg.name].camOn = msg.camOn; }
    renderVoiceUsers(); renderVoiceStage();
  }

  if (msg.type === 'offer')  await handleOffer(msg.from, msg.sdp);
  if (msg.type === 'answer') await handleAnswer(msg.from, msg.sdp);
  if (msg.type === 'ice')    await handleIce(msg.from, msg.candidate);

  // DataChannel chat in voice
  if (msg.type === 'dc-chat') showTextMsg(msg.name, msg.color, msg.text);
}

// ════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════
function switchTo(type, name) {
  // Update active channel highlight
  ['general','garage','raceway','showroom'].forEach(c => {
    document.getElementById('ch-' + c)?.classList.remove('active');
  });
  document.getElementById('ch-' + name)?.classList.add('active');

  currentChannel = name;
  currentChannelType = type;

  const info = CHANNEL_INFO[name];
  document.getElementById('ch-header-icon').textContent = info.icon;
  document.getElementById('ch-header-name').textContent = name;
  document.getElementById('ch-header-desc').textContent = info.desc;

  if (type === 'text') {
    document.getElementById('voice-view').style.display = 'none';
    document.getElementById('text-view').style.display = 'flex';
  } else {
    document.getElementById('text-view').style.display = 'none';
    document.getElementById('voice-view').style.display = 'flex';
    renderVoiceStage();

    if (inVoiceChannel === name) {
      document.getElementById('not-in-voice').style.display = 'none';
      document.getElementById('in-voice').style.display = 'flex';
    } else {
      document.getElementById('not-in-voice').style.display = 'flex';
      document.getElementById('in-voice').style.display = 'none';
    }
  }
}

// ════════════════════════════════════════
// VOICE
// ════════════════════════════════════════
async function joinVoice() {
  // Leave current voice if any
  if (inVoiceChannel) await leaveVoice(true);

  inVoiceChannel = currentChannel;
  members[myName].channel = inVoiceChannel;

  // Get mic
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    toast('Joined ' + inVoiceChannel + ' 🎙️', 'ok');
    // Start speaking detection for myself
    startSpeakDetect(myName, localStream);
  } catch {
    localStream = new MediaStream();
    toast('No mic access', 'warn');
  }

  broadcast({ type: 'joined-voice', name: myName, channel: inVoiceChannel });

  document.getElementById('not-in-voice').style.display = 'none';
  document.getElementById('in-voice').style.display = 'flex';

  renderVoiceUsers();
  renderVoiceStage();

  // Connect to everyone already in this channel
  for (const [n, m] of Object.entries(members)) {
    if (n !== myName && m.channel === inVoiceChannel) {
      await offerPeer(n);
    }
  }
}

async function leaveVoice(silent = false) {
  if (!inVoiceChannel) return;
  broadcast({ type: 'left-voice', name: myName });
  inVoiceChannel = null;
  members[myName].channel = null;

  // Close all peer connections
  for (const n of Object.keys(peers)) removePeer(n);

  // Stop self speaking detection
  stopSpeakDetect(myName);
  setSpeakingUI(myName, false);

  localStream?.getTracks().forEach(t => t.stop()); localStream = null;
  screenStream?.getTracks().forEach(t => t.stop()); screenStream = null;
  vcCamOn = false; vcScreenOn = false; vcMicOn = true;
  document.getElementById('vc-cam').className = 'vc-btn';
  document.getElementById('vc-screen').className = 'vc-btn';
  document.getElementById('vc-mic').className = 'vc-btn';

  document.getElementById('not-in-voice').style.display = 'flex';
  document.getElementById('in-voice').style.display = 'none';

  renderVoiceUsers();
  renderVoiceStage();
  if (!silent) toast('Left voice channel', 'warn');
}

async function offerPeer(name) {
  if (peers[name]) return;
  const pc = makePc(name);
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  broadcast({ type: 'offer', from: myName, to: name, sdp: offer });
}

async function handleOffer(from, sdp) {
  if (!inVoiceChannel || members[from]?.channel !== inVoiceChannel) return;
  const pc = makePc(from);
  await pc.setRemoteDescription(new RTCSessionDescription(sdp));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  broadcast({ type: 'answer', from: myName, to: from, sdp: answer });
}

async function handleAnswer(from, sdp) {
  const p = peers[from];
  if (p?.pc?.signalingState === 'have-local-offer') {
    await p.pc.setRemoteDescription(new RTCSessionDescription(sdp));
  }
}

async function handleIce(from, candidate) {
  try {
    const p = peers[from];
    if (p?.pc?.remoteDescription) await p.pc.addIceCandidate(new RTCIceCandidate(candidate));
  } catch {}
}

function makePc(name) {
  const pc = new RTCPeerConnection(RTC_CFG);
  peers[name] = { pc, stream: null };

  if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  pc.ontrack = e => {
    peers[name].stream = e.streams[0];
    hookGain(name, e.streams[0]);
    renderVoiceStage();
  };

  pc.onicecandidate = e => {
    if (e.candidate) broadcast({ type: 'ice', from: myName, to: name, candidate: e.candidate });
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') removePeer(name);
  };

  return pc;
}

function removePeer(name) {
  if (peers[name]) {
    peers[name].pc?.close();
    peers[name]._audio?.pause();
    delete peers[name];
  }
  if (gainNodes[name]) { gainNodes[name].disconnect(); delete gainNodes[name]; }
  stopSpeakDetect(name);
  setSpeakingUI(name, false);
  renderVoiceStage();
}

// ── Voice controls ──
function toggleVcMic() {
  vcMicOn = !vcMicOn;
  localStream?.getAudioTracks().forEach(t => t.enabled = vcMicOn);
  members[myName].micOn = vcMicOn;
  const btn = document.getElementById('vc-mic');
  btn.textContent = vcMicOn ? '🎙️' : '🔇';
  btn.className = 'vc-btn' + (vcMicOn ? '' : ' off');
  document.getElementById('panel-mic').className = 'panel-btn' + (vcMicOn ? '' : ' muted');
  broadcast({ type: 'voice-state', name: myName, micOn: vcMicOn, camOn: vcCamOn });
  renderVoiceStage();
}

function togglePanelMic() { if (inVoiceChannel) toggleVcMic(); }

async function toggleVcCam() {
  vcCamOn = !vcCamOn;
  const btn = document.getElementById('vc-cam');
  if (vcCamOn) {
    try {
      const vs = await navigator.mediaDevices.getUserMedia({ video: true });
      const vt = vs.getVideoTracks()[0];
      if (!localStream) localStream = new MediaStream();
      localStream.addTrack(vt);
      for (const p of Object.values(peers)) {
        const s = p.pc.getSenders().find(x => x.track?.kind==='video');
        s ? s.replaceTrack(vt) : p.pc.addTrack(vt, localStream);
      }
      btn.className = 'vc-btn on'; toast('Camera on', 'ok');
    } catch { vcCamOn = false; toast('Camera denied', 'warn'); }
  } else {
    localStream?.getVideoTracks().forEach(t => { t.stop(); localStream?.removeTrack(t); });
    btn.className = 'vc-btn';
  }
  members[myName].camOn = vcCamOn;
  broadcast({ type: 'voice-state', name: myName, micOn: vcMicOn, camOn: vcCamOn });
  renderVoiceStage();
}

async function toggleVcScreen() {
  vcScreenOn = !vcScreenOn;
  const btn = document.getElementById('vc-screen');
  if (vcScreenOn) {
    try {
      screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
      const st = screenStream.getVideoTracks()[0];
      st.onended = () => { vcScreenOn = false; btn.className = 'vc-btn'; };
      if (!localStream) localStream = new MediaStream();
      localStream.addTrack(st);
      for (const p of Object.values(peers)) {
        const s = p.pc.getSenders().find(x => x.track?.kind==='video');
        s ? s.replaceTrack(st) : p.pc.addTrack(st, localStream);
      }
      btn.className = 'vc-btn on'; toast('Sharing screen', 'ok');
    } catch { vcScreenOn = false; toast('Screen share cancelled', 'warn'); }
  } else {
    screenStream?.getTracks().forEach(t => t.stop()); screenStream = null;
    btn.className = 'vc-btn';
  }
}

// ════════════════════════════════════════
// RENDER
// ════════════════════════════════════════
function renderMembers() {
  const list = document.getElementById('members-list');
  const online = Object.values(members);
  document.getElementById('member-count').textContent = online.length;
  list.innerHTML = '';
  online.forEach(m => {
    const d = document.createElement('div');
    d.className = 'member-item';
    d.innerHTML = `
      <div class="member-av ${COLORS[m.color]}">
        ${m.name[0].toUpperCase()}
        <div class="online-ring"></div>
      </div>
      <span>${esc(m.name)}</span>
    `;
    list.appendChild(d);
  });
}

function renderVoiceUsers() {
  ['garage','raceway','showroom'].forEach(ch => {
    const el = document.getElementById('vu-' + ch);
    if (!el) return;
    el.innerHTML = '';
    Object.values(members).filter(m => m.channel === ch).forEach(m => {
      const d = document.createElement('div');
      d.className = 'voice-user-item';
      d.innerHTML = `
        <div class="vu-dot ${COLORS[m.color]}">${m.name[0].toUpperCase()}</div>
        <span>${esc(m.name)}</span>
        <span class="mic-icon">${m.micOn !== false ? '🎙️' : '🔇'}</span>
      `;
      el.appendChild(d);
    });
  });
}

function setVolume(name, val) {
  peerVolumes[name] = val;
  // Update gain node if exists
  if (gainNodes[name]) {
    gainNodes[name].gain.value = val / 100;
  }
  // Update slider fill color
  const slider = document.getElementById('vol-' + name);
  if (slider) {
    const pct = val / 2; // 0-200 mapped to 0-100%
    slider.style.background = `linear-gradient(to right, var(--accent2) 0%, var(--accent2) ${pct}%, rgba(255,255,255,0.2) ${pct}%, rgba(255,255,255,0.2) 100%)`;
    const label = document.getElementById('volpct-' + name);
    if (label) label.textContent = val + '%';
  }
}

function hookGain(name, stream) {
  if (!stream || stream.getAudioTracks().length === 0) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(stream);
    const dst = audioCtx.createMediaStreamDestination();
    const gain = audioCtx.createGain();
    gain.gain.value = (peerVolumes[name] ?? 100) / 100;
    src.connect(gain);
    gain.connect(dst);
    gainNodes[name] = gain;
    // Play through gain destination
    const audio = new Audio();
    audio.srcObject = dst.stream;
    audio.play().catch(()=>{});
    peers[name]._audio = audio;
    // Start speaking detection for this peer
    startSpeakDetect(name, stream);
  } catch(e) {}
}

function renderVoiceStage() {
  const stage = document.getElementById('voice-stage');
  if (!stage) return;
  stage.innerHTML = '';

  const ch = currentChannel;
  if (currentChannelType !== 'voice') return;

  const inChannel = Object.values(members).filter(m => m.channel === ch);

  if (inChannel.length === 0) {
    stage.innerHTML = `<div class="voice-empty"><div class="big-icon">🔇</div><p>Nobody's here yet</p></div>`;
    return;
  }

  inChannel.forEach(m => {
    const isMe = m.name === myName;
    const peerData = peers[m.name];
    const hasVideo = isMe ? (vcCamOn || vcScreenOn) : (peerData?.stream?.getVideoTracks().length > 0);

    const tile = document.createElement('div');
    tile.className = 'voice-tile';
    tile.id = 'tile-' + m.name;

    if (hasVideo) {
      const vid = document.createElement('video');
      vid.autoplay = true;
      vid.muted = isMe;
      vid.playsInline = true;
      if (isMe) vid.srcObject = localStream;
      else if (peerData?.stream) vid.srcObject = peerData.stream;
      tile.appendChild(vid);
    } else {
      const ph = document.createElement('div');
      ph.className = 'tile-placeholder';
      ph.innerHTML = `
        <div class="tile-av ${COLORS[m.color]}" id="spkav-${m.name}">${m.name[0].toUpperCase()}</div>
        <div class="tile-name">${esc(m.name)}${isMe ? ' (you)' : ''}</div>
      `;
      tile.appendChild(ph);
    }

    const badge = document.createElement('div');
    badge.className = 'tile-badge';
    badge.textContent = m.name + (isMe ? ' (you)' : '');
    tile.appendChild(badge);

    const micBadge = document.createElement('div');
    micBadge.className = 'tile-mic-badge';
    micBadge.textContent = (m.micOn !== false) ? '🎙️' : '🔇';
    tile.appendChild(micBadge);

    // Volume slider — show for everyone except yourself
    if (!isMe) {
      const vol = peerVolumes[m.name] ?? 100;
      const pct = vol / 2;
      const volRow = document.createElement('div');
      volRow.className = 'tile-volume';
      volRow.innerHTML = `
        <span class="vol-icon">🔈</span>
        <input
          type="range"
          class="vol-slider"
          id="vol-${m.name}"
          min="0" max="200" value="${vol}"
          style="background: linear-gradient(to right, var(--accent2) 0%, var(--accent2) ${pct}%, rgba(255,255,255,0.2) ${pct}%, rgba(255,255,255,0.2) 100%);"
          oninput="setVolume('${m.name}', parseInt(this.value))"
        >
        <span class="vol-pct" id="volpct-${m.name}">${vol}%</span>
      `;
      tile.appendChild(volRow);
    }

    stage.appendChild(tile);
  });
}

// ════════════════════════════════════════
// TEXT CHAT
// ════════════════════════════════════════
function sendTextMsg() {
  const inp = document.getElementById('text-input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  showTextMsg(myName, myColor, text);
  broadcast({ type: 'chat', name: myName, color: myColor, text });
}

function showTextMsg(name, color, text) {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg';
  const t = new Date();
  const time = t.getHours().toString().padStart(2,'0') + ':' + t.getMinutes().toString().padStart(2,'0');
  const colorClass = COLORS[color] || 'c0';
  d.innerHTML = `
    <div class="msg-av ${colorClass}">${name[0].toUpperCase()}</div>
    <div class="msg-body">
      <div class="msg-header">
        <span class="msg-name">${esc(name)}</span>
        <span class="msg-time">${time}</span>
      </div>
      <div class="msg-text">${esc(text)}</div>
    </div>
  `;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function addSys(text) {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'sys-msg';
  d.textContent = text;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function addSysSilent(text) {
  // Only add system message if we're looking at text channel
  if (currentChannelType === 'text') addSys(text);
}

// ════════════════════════════════════════
// LEAVE SERVER
// ════════════════════════════════════════
function refreshPage() {
  location.reload();
}

function leaveServer() {
  broadcast({ type: 'left-server', name: myName });
  if (inVoiceChannel) leaveVoice(true);
  channel?.close();
  document.getElementById('app').style.display = 'none';
  document.getElementById('join-screen').style.display = 'flex';
  document.getElementById('name-input').value = '';
  document.getElementById('messages').innerHTML = '<div class="sys-msg">Welcome to #general — the Car server!</div>';
  members = {}; peers = {};
}

// ════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════
function toast(msg, type='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 2500);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinServer();
});
</script>
